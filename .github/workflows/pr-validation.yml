name: PR Validation - Single Environment Rule

on:
  pull_request:
    paths:
      - 'envs/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-single-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check single environment modification
        id: check_env
        run: |
          echo "Checking if PR modifies only one environment..."
          
          # Get the list of changed files
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Find which environments are modified
          MODIFIED_ENVS=$(echo "$CHANGED_FILES" | grep '^envs/' | cut -d'/' -f2 | sort -u)
          ENV_COUNT=$(echo "$MODIFIED_ENVS" | grep -v '^$' | wc -l)
          
          echo ""
          echo "Modified environments:"
          echo "$MODIFIED_ENVS"
          echo ""
          echo "Number of environments modified: $ENV_COUNT"
          
          if [ "$ENV_COUNT" -gt 1 ]; then
            echo "❌ ERROR: This PR modifies multiple environments!"
            echo "Modified environments: $(echo $MODIFIED_ENVS | tr '\n' ', ')"
            echo ""
            echo "Policy: One PR should only modify ONE environment."
            echo "Please split this PR into separate PRs for each environment."
            exit 1
          elif [ "$ENV_COUNT" -eq 1 ]; then
            echo "✅ SUCCESS: This PR modifies only one environment: $MODIFIED_ENVS"
            echo "modified_env=$MODIFIED_ENVS" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "⚠️  WARNING: No environment changes detected in envs/ directory"
            exit 0
          fi

      - name: Setup Terraform
        if: steps.check_env.outputs.modified_env != ''
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Terraform Init and Plan
        if: steps.check_env.outputs.modified_env != ''
        id: plan
        run: |
          MODIFIED_ENV="${{ steps.check_env.outputs.modified_env }}"
          echo "Running terraform plan for environment: $MODIFIED_ENV"
          cd envs/$MODIFIED_ENV
          
          echo "Initializing Terraform..."
          terraform init -backend-config=backend.tf
          
          echo ""
          echo "Running Terraform Plan..."
          
          # Capture plan output
          if [ -f "$MODIFIED_ENV.tfvars" ]; then
            terraform plan -var-file="$MODIFIED_ENV.tfvars" -no-color -out=tfplan 2>&1 | tee plan_output.txt
          else
            terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          fi
          
          # Save plan output for comment
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_ENV
          cat plan_output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "modified_env=$MODIFIED_ENV" >> $GITHUB_OUTPUT
        env:
          TF_IN_AUTOMATION: true
        continue-on-error: false

      - name: Post Terraform Plan as PR Comment
        if: steps.check_env.outputs.modified_env != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = process.env.PLAN_OUTPUT;
            const env = '${{ steps.plan.outputs.modified_env }}';
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Plan for Environment:')
            });
            
            const commentBody = `## Terraform Plan for Environment: \`${env}\`
            
            <details>
            <summary>📋 Click to view the full plan output</summary>
            
            \`\`\`terraform
            ${output}
            \`\`\`
            
            </details>
            
            ---
            
            **✅ Plan Status:** Successful
            
            **⚠️ Please review the plan carefully before approving this PR.**
            
            - Check for any unexpected resource changes
            - Verify that only intended resources will be created/modified/destroyed
            - Ensure the changes align with the PR description
            
            *Plan generated for PR #${{ github.event.pull_request.number }} at ${new Date().toISOString()}*`;
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
