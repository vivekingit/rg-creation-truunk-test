name: PR Validation - Terraform Plan

on:
  pull_request:
    paths:
      - 'envs/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect modified environment
        id: detect_env
        run: |
          echo "Detecting modified environment..."
          
          # Get the list of changed files
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Find which environment is modified
          MODIFIED_ENV=$(echo "$CHANGED_FILES" | grep '^envs/' | cut -d'/' -f2 | sort -u | grep -v '^$' | head -n 1)
          
          if [ -z "$MODIFIED_ENV" ]; then
            echo "No environment changes detected. Skipping terraform plan."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Modified environment: $MODIFIED_ENV"
          echo "modified_env=$MODIFIED_ENV" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        if: steps.detect_env.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Terraform Init and Plan
        if: steps.detect_env.outputs.skip != 'true'
        id: plan
        run: |
          MODIFIED_ENV="${{ steps.detect_env.outputs.modified_env }}"
          echo "Running terraform plan for environment: $MODIFIED_ENV"
          cd envs/$MODIFIED_ENV
          
          echo "Initializing Terraform..."
          terraform init
          
          echo ""
          echo "Running Terraform Plan..."
          
          # Capture plan output
          if [ -f "$MODIFIED_ENV.tfvars" ]; then
            terraform plan -var-file="$MODIFIED_ENV.tfvars" -no-color -out=tfplan 2>&1 | tee plan_output.txt
          else
            terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          fi
          
          # Save plan output for comment
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_ENV
          cat plan_output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "modified_env=$MODIFIED_ENV" >> $GITHUB_OUTPUT
        env:
          TF_IN_AUTOMATION: true
        continue-on-error: false

      - name: Post Terraform Plan as PR Comment
        if: steps.detect_env.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = process.env.PLAN_OUTPUT;
            const env = '${{ steps.plan.outputs.modified_env }}';
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Plan for Environment:')
            });
            
            const commentBody = `## Terraform Plan for Environment: \`${env}\`
            
            <details>
            <summary>📋 Click to view the full plan output</summary>
            
            \`\`\`terraform
            ${output}
            \`\`\`
            
            </details>
            
            ---
            
            **✅ Plan Status:** Successful
            
            **⚠️ Please review the plan carefully before approving this PR.**
            
            - Check for any unexpected resource changes
            - Verify that only intended resources will be created/modified/destroyed
            - Ensure the changes align with the PR description
            
            *Plan generated for PR #${{ github.event.pull_request.number }} at ${new Date().toISOString()}*`;
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
